name: MJB
version: 1.0
main: com.UserMC.MJB.MJB
api-version: "1.21"
authors: [Fabianpizza]
description: CityLife core plugin
depend: [Vault, WorldGuard]
softdepend: [Citizens]

commands:
  pay:
    description: Pay another player from your bank account
    usage: /pay <player> <amount>
  deposit:
    description: Deposit cash into your bank account (must be at a bank)
    usage: /deposit <amount>
  withdraw:
    description: Withdraw cash from your bank account (must be at a bank)
    usage: /withdraw <amount>
  mjbadmin:
    description: Admin command for CityLife management
    usage: /mjbadmin <subcommand>
    permission: mjb.admin
  plotinfo:
    description: Show info about the plot you are standing in
    usage: /plotinfo
    aliases: [ pi ]
  terminal:
    description: Register or remove a card terminal
    usage: /terminal <register|remove|set>
  buycard:
    description: Buy a debit card from the bank
    usage: /buycard
  cancelcard:
    description: Cancel your debit card at the bank
    usage: /cancelcard
  acceptjob:
    description: Accept a pending job offer
    usage: /acceptjob
  declinejob:
    description: Decline a pending job offer
    usage: /declinejob
  police:
    description: Police officer commands
    usage: /police <info|wanted|charge|process|clear|rank|myrank>
  911:
    description: Emergency services call
    usage: /911 <message>
  112:
    description: Emergency services call
    usage: /112 <message>


permissions:
  mjb.admin:
    description: Access to CityLife admin commands
    default: op