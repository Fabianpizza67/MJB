name: MJB
version: 0.1.2
main: com.UserMC.MJB.MJB
api-version: "1.21"
authors: [Fabianpizza]
description: CityLife core plugin
depend: [Vault, WorldGuard]
softdepend: [Citizens, voicechat]

commands:
  pay:
    description: Pay another player from your bank account
    usage: /pay <player> <amount>
  deposit:
    description: Deposit cash into your bank account (must be at a bank)
    usage: /deposit <amount>
  withdraw:
    description: Withdraw cash from your bank account (must be at a bank)
    usage: /withdraw <amount>
  mjbadmin:
    description: Admin command for CityLife management
    usage: /mjbadmin <subcommand>
    permission: mjb.admin
  plotinfo:
    description: Show info about the plot you are standing in
    usage: /plotinfo
    aliases: [ pi ]
  terminal:
    description: Register or remove a card terminal
    usage: /terminal <register|remove|set>
  buycard:
    description: Buy a debit card from the bank
    usage: /buycard
  cancelcard:
    description: Cancel your debit card at the bank
    usage: /cancelcard
  acceptjob:
    description: Accept a pending job offer
    usage: /acceptjob
  declinejob:
    description: Decline a pending job offer
    usage: /declinejob
  police:
    description: Police officer commands
    usage: /police <info|wanted|charge|process|clear|rank|myrank>
  911:
    description: Emergency services call
    usage: /911 <message>
  112:
    description: Emergency services call
    usage: /112 <message>
  party:
    description: Party management
    usage: /party <create|disband|invite|kick|leave|info|list>
  laws:
    description: View active laws
    usage: /laws
  mayor:
    description: View mayor info and mayor commands
    usage: /mayor [subcommand]
  government:
    description: View government status
    usage: /government
    aliases: [ gov ]
  answercall:
    description: Answer an incoming call
    usage: /answercall
  declinecall:
    description: Decline an incoming call
    usage: /declinecall
  endcall:
    description: End your current call
    usage: /endcall
  council:
    description: Council chair commands
    usage: /council <subcommand>
  acceptsale:
    description: Accept a pending company sale offer
    usage: /acceptsale
  declinesale:
    description: Decline a pending company sale offer
    usage: /declinesale


permissions:
  mjb.admin:
    description: Access to CityLife admin commands
    default: op